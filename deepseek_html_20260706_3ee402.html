<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>農夫守塔 - 初春試煉</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-container">
    <!-- 頂部狀態列 -->
    <div id="status-bar">
      <div class="status-item">🌿 <span id="res-hay">100</span></div>
      <div class="status-item">🌽 <span id="res-corn">80</span></div>
      <div class="status-item">🥚 <span id="res-meatEgg">0</span></div>
      <div class="status-item">🍖 <span id="res-meat">0</span></div>
      <div class="status-item">💰 <span id="res-gold">0</span></div>
      <div class="status-item">⏱️ <span id="timer">05:00</span></div>
    </div>

    <!-- 遊戲棋盤 -->
    <div id="game-board"></div>

    <!-- 操作按鈕區 -->
    <div id="controls">
      <div id="build-buttons"></div>
      <button id="btn-start">開始防守</button>
      <button id="btn-shop">商店</button>
    </div>

    <!-- 簡易訊息提示 -->
    <div id="message"></div>
  </div>

  <!-- 商店模態對話框 -->
  <div id="shop-modal" class="modal hidden">
    <div class="modal-content">
      <h2>🛒 商店</h2>
      <div id="shop-items"></div>
      <button id="btn-close-shop">關閉</button>
    </div>
  </div>

  <!-- 結算面板 -->
  <div id="result-modal" class="modal hidden">
    <div class="modal-content">
      <h2 id="result-title"></h2>
      <p id="result-detail"></p>
      <button id="btn-restart">再來一局</button>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="game.js"></script>
</body>
</html>
