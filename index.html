<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>農夫守塔 - 無限挑戰</title>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #2d4a22;
  font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  overflow-x: hidden;
}

#game-container {
  background: #f5e6c8;
  border: 4px solid #8b5a2b;
  border-radius: 16px;
  padding: 20px;
  width: 780px;
  max-width: 98vw;
  max-height: 95vh;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  display: flex;
  gap: 15px;
}

#left-panel {
  width: 110px;
  display: grid;
  grid-template-rows: repeat(9, 48px);
  height: 432px;
  flex-shrink: 0;
  gap: 0;
}

.resource-card {
  background: #fffde7;
  border: 1px solid #a5d6a7;
  display: flex;
  flex-direction: row;        /* 水平排列 */
  align-items: center;        /* 垂直置中 */
  justify-content: center;    /* 水平置中 */
  gap: 4px;                   /* 圖與數字間距 */
  font-weight: bold;
  color: #3e2723;
  margin: 0;
  padding: 2px 4px;
  font-size: 13px;
}

.resource-card .emoji { font-size: 20px; line-height: 1; }
.resource-card .value { font-size: 16px; line-height: 1; }
.resource-card small {
  font-size: 9px;
  color: #795548;
  display: block;
  position: absolute;
  bottom: 1px;
  right: 3px;
}

/* 讓資源卡有相對定位，以便 small 定位 */
.resource-card {
  position: relative;
}

/* 固定在特定行 */
.resource-card:nth-child(1) { grid-row: 2; }
.resource-card:nth-child(2) { grid-row: 3; }
.resource-card:nth-child(3) { grid-row: 4; }
.resource-card:nth-child(4) { grid-row: 5; }
.resource-card:nth-child(5) { grid-row: 6; }

#timer-display {
  grid-row: 8;
  background: #3e2723;
  color: #ffcc80;
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: monospace;
  border: 1px solid #a5d6a7;
}

#center-area {
  flex-grow: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

#game-board {
  position: relative;
  width: 432px !important;
  height: 432px !important;
  background: #c8e6c9;
  border: 2px solid #6d4c41;
  border-radius: 8px;
  overflow: hidden;
  box-shadow: inset 0 0 0 48px rgba(0, 0, 0, 0.35);
  cursor: crosshair;
}

#game-board::before {
  content: "";
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background-image:
    repeating-linear-gradient(90deg, #a5d6a7 0px, #a5d6a7 1px, transparent 1px, transparent 48px),
    repeating-linear-gradient(0deg, #a5d6a7 0px, #a5d6a7 1px, transparent 1px, transparent 48px);
  pointer-events: none;
  z-index: 0;
}

.cell, .building, .mouse, .mouse-hole { position: absolute; z-index: 2; }
.cell {
  width: 48px; height: 48px;
  display: flex; justify-content: center; align-items: center;
  font-size: 28px; pointer-events: none;
}
.building {
  width: 48px; height: 48px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  font-size: 28px;
  background: rgba(255,255,200,0.5);
  border-radius: 50%;
  transition: transform 0.15s ease-out;
  line-height: 1;
}
.farmhouse {
  background: rgba(255, 215, 0, 0.3);
  border-radius: 8px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 48px;
  height: 48px;
}
.farmhouse-emoji {
  font-size: 24px;
  line-height: 1;
}
.range-indicator {
  position: absolute; left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  border: 2px dashed rgba(255, 255, 0, 0.6);
  border-radius: 50%;
  background: rgba(255, 255, 0, 0.1);
  pointer-events: none; opacity: 0; transition: opacity 0.2s;
}
.building:hover .range-indicator { opacity: 1; }
.mouse {
  position: absolute; font-size: 22px;
  transform: translate(-50%, -50%);
  z-index: 3; pointer-events: none;
}
.mouse-hole {
  width: 48px; height: 48px;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px;
  background: rgba(0,0,0,0.15);
  border-radius: 50%; z-index: 2;
}
.hp-bar-container {
  width: 80%; height: 4px;
  background: #ccc; border-radius: 2px;
  margin-top: 1px; overflow: hidden;
}
.hp-bar-fill {
  height: 100%; background: #4caf50;
  transition: width 0.2s;
}

#right-panel {
  width: 130px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  flex-shrink: 0;
}

.panel-section h3 {
  font-size: 13px;
  color: #5d4037;
  border-bottom: 2px solid #d7ccc8;
  padding-bottom: 4px;
  margin-bottom: 6px;
  text-align: center;
}

#build-buttons, #resource-buttons {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

button {
  padding: 6px 8px;
  font-size: 13px;
  font-weight: bold;
  border-radius: 6px;
  border: 2px solid #5d4037;
  background: #ffe0b2;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
}
button:hover:not(:disabled) { background: #ffcc80; transform: translateY(-1px); }
button:active:not(:disabled) { transform: translateY(1px); }
button:disabled { opacity: 0.5; cursor: not-allowed; filter: grayscale(0.8); }

button.selected {
  background: #ffb74d;
  border-color: #e65100;
  box-shadow: 0 0 0 2px #e65100;
}

#bottom-controls {
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 8px;
  padding-top: 8px;
  border-top: 2px dashed #d7ccc8;
}

#message {
  flex-grow: 1;
  text-align: center;
  color: #bf360c;
  font-weight: bold;
  min-height: 20px;
  font-size: 13px;
}

.action-btn {
  padding: 8px 16px;
  font-size: 14px;
  background: #8bc34a;
  color: #1b5e20;
  border-color: #33691e;
}
.action-btn:hover:not(:disabled) { background: #7cb342; }

.shop-btn {
  background: #ffd54f;
  color: #f57f17;
  border-color: #fbc02d;
}

.modal {
  position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.6);
  display: flex; justify-content: center; align-items: center;
  z-index: 100; backdrop-filter: blur(2px);
}
.modal.hidden { display: none; }
.modal-content {
  background: #fffde7;
  border: 4px solid #8b5a2b;
  border-radius: 16px;
  padding: 24px;
  min-width: 280px;
  text-align: center;
  box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}
.modal-content h2 { margin-bottom: 16px; color: #3e2723; }
#shop-items { text-align: left; margin: 16px 0; max-height: 250px; overflow-y: auto; }
.shop-item {
  background: #fff; border: 1px solid #d7ccc8;
  padding: 8px; margin-bottom: 6px; border-radius: 8px;
  display: flex; justify-content: space-between; align-items: center;
}
.shop-item-info strong { font-size: 14px; display: block; color: #5d4037; }
.shop-item-info span { font-size: 11px; color: #795548; }
</style>
</head>
<body>

<div id="game-container">
  <div id="left-panel">
    <div class="resource-card">
      <span class="emoji">🌿</span>
      <span class="value" id="res-hay">0</span>
      <small>牧草</small>
    </div>
    <div class="resource-card">
      <span class="emoji">🌽</span>
      <span class="value" id="res-corn">0</span>
      <small>玉米</small>
    </div>
    <div class="resource-card">
      <span class="emoji">🥚</span>
      <span class="value" id="res-meatEgg">0</span>
      <small>肉蛋</small>
    </div>
    <div class="resource-card">
      <span class="emoji">🍖</span>
      <span class="value" id="res-meat">0</span>
      <small>肉食</small>
    </div>
    <div class="resource-card" style="background: #fff8e1;">
      <span class="emoji">💰</span>
      <span class="value" id="res-gold">0</span>
      <small>金幣</small>
    </div>
    <div id="timer-display">⏱️ <span id="timer">00:00</span></div>
  </div>

  <div id="center-area">
    <div id="game-board"></div>
    <div id="bottom-controls">
      <button id="btn-shop" class="shop-btn">🛒 商店</button>
      <div id="message"></div>
      <button id="btn-start" class="action-btn">開始遊戲</button>
    </div>
  </div>

  <div id="right-panel">
    <div class="panel-section">
      <h3>🏰 建造防禦</h3>
      <div id="build-buttons"></div>
    </div>
    <div class="panel-section">
      <h3>🛍️ 購買資源</h3>
      <div id="resource-buttons"></div>
    </div>
  </div>
</div>

<!-- 商店、結果彈窗保持不變 -->
<div id="shop-modal" class="modal hidden">
  <div class="modal-content">
    <h2>🛒 升級商店</h2>
    <div id="shop-items"></div>
    <button id="btn-close-shop">關閉</button>
  </div>
</div>

<div id="result-modal" class="modal hidden">
  <div class="modal-content">
    <h2 id="result-title">😵 任務失敗…</h2>
    <p id="result-detail" style="margin:16px 0; line-height:1.6; color:#5d4037;"></p>
    <button id="btn-play-again" class="action-btn">再來一局</button>
  </div>
</div>

<script src="config.js"></script>
<script src="game.js"></script>
</body>
</html>
