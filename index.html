<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>農夫守塔 - 無限挑戰 8x8</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* 強制棋盤 8x8 */
    #game-board {
      width: 512px !important;
      height: 512px !important;
    }
    .outer-overlay {
      border: 64px solid rgba(0, 0, 0, 0.35) !important;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="status-bar">
      <div class="status-item">🌿 <span id="res-hay">100</span></div>
      <div class="status-item">🌽 <span id="res-corn">80</span></div>
      <div class="status-item">🥚 <span id="res-meatEgg">0</span></div>
      <div class="status-item">🍖 <span id="res-meat">0</span></div>
      <div class="status-item">💰 <span id="res-gold">0</span></div>
      <div class="status-item">⏱️ <span id="timer">00:00</span></div>
    </div>

    <div id="game-board">
      <div class="outer-overlay"></div>
    </div>

    <div id="controls">
      <div id="build-buttons"></div>
      <div id="resource-buttons"></div>
      <button id="btn-shop">商店</button>
      <button id="btn-restart">重新開始</button>
    </div>

    <div id="message"></div>
  </div>

  <div id="shop-modal" class="modal hidden">
    <div class="modal-content">
      <h2>🛒 商店</h2>
      <div id="shop-items"></div>
      <button id="btn-close-shop">關閉</button>
    </div>
  </div>

  <div id="result-modal" class="modal hidden">
    <div class="modal-content">
      <h2 id="result-title"></h2>
      <p id="result-detail"></p>
      <button id="btn-play-again">再來一局</button>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="game.js"></script>
</body>
</html>
